version: 2

models:
  - name: raw_crm_cust_info
    description: "Daily customer master filtered to the current partition (from Dagster-landed daily CSVs)"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [cst_id, snapshot_date]
          # Source data has a handful of duplicate cst_ids on the same day;
          # warn so the demo pipeline still completes. In production you'd
          # fix the source or add dedup logic in this model.
          config:
            severity: warn
    columns:
      - name: cst_id
        description: "Customer ID"
        # Real sant3e data has a handful of null cst_ids; warn so the demo pipeline still completes.
        tests:
          - not_null:
              severity: warn
      - name: cst_key
        description: "Customer key"
        tests:
          - not_null
      - name: snapshot_date
        description: "Partition date this row belongs to"
        tests:
          - not_null

  - name: raw_crm_prd_info
    description: "Product master for the current partition — latest monthly snapshot on-or-before the partition date"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [prd_id, snapshot_date]
    columns:
      - name: prd_id
        description: "Product ID"
        tests:
          - not_null
      - name: prd_key
        description: "Product key"
        tests:
          - not_null
      - name: snapshot_month
        description: "First-of-month date of the monthly source record used for this partition"
        tests:
          - not_null
      - name: snapshot_date
        description: "Daily partition date this row was projected onto"
        tests:
          - not_null

  - name: raw_crm_sales_details
    description: "Daily sales transactions filtered to the current partition"
    columns:
      - name: sls_ord_num
        description: "Sales order number"
        tests:
          - not_null
      - name: sls_prd_key
        description: "Sales product key"
        tests:
          - not_null
      - name: sls_cust_id
        description: "Sales customer ID"
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null

  - name: raw_erp_CUST_AZ12
    description: "ERP customer reference — seeded + stamped onto the daily partition grid"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [CID, snapshot_date]
    columns:
      - name: CID
        description: "Customer ID"
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null

  - name: raw_erp_LOC_A101
    description: "Daily customer location master filtered to the current partition"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [CID, snapshot_date]
    columns:
      - name: CID
        description: "Customer ID"
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null

  - name: raw_erp_PX_CAT_G1V2
    description: "ERP product category taxonomy — seeded + stamped onto the daily partition grid"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [ID, snapshot_date]
    columns:
      - name: ID
        description: "Category ID"
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
