version: 2

models:
  - name: stg_crm_cust_info
    description: "Cleaned customer master for the current partition; deduped on cst_id within the snapshot"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [cst_id, snapshot_date]
          config:
            severity: warn
    columns:
      - name: cst_id
        # Upstream has a handful of nulls; kept as warn for demo purposes.
        tests:
          - not_null:
              severity: warn
      - name: cst_key
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]

  - name: stg_crm_prd_info
    description: "Cleaned product master for the current partition with SCD-style prd_end_dt derived via LEAD"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [prd_id, snapshot_date]
    columns:
      - name: prd_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]

  - name: stg_crm_sales_details
    description: "Cleaned sales for the current partition with integer dates converted to real DATE"
    columns:
      - name: sls_ord_num
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]

  - name: stg_erp_CUST_AZ12
    description: "Cleaned ERP customer reference, daily-partitioned via the seed stamp in landing"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [CID, snapshot_date]
          config:
            severity: warn
    columns:
      - name: CID
        tests:
          - not_null:
              severity: warn
      - name: snapshot_date
        tests: [not_null]

  - name: stg_erp_LOC_A101
    description: "Cleaned ERP location data for the current partition"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [CID, snapshot_date]
    columns:
      - name: CID
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]

  - name: stg_erp_PX_CAT_G1V2
    description: "Cleaned category taxonomy, daily-partitioned via the seed stamp in landing"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [ID, snapshot_date]
    columns:
      - name: ID
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
