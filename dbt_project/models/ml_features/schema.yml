version: 2

models:
  - name: customer_rfm
    description: "RFM (Recency / Frequency / Monetary) customer features consumed by ml_pipelines"
    columns:
      - name: customer_key
        description: "Surrogate key joining back to dim_customers"
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: recency_days
        description: "Days between the customer's last order and the dataset's most recent order"
        tests: [not_null]
      - name: frequency
        description: "Count of orders placed by the customer"
        tests: [not_null]
      - name: monetary
        description: "Total sales amount attributed to the customer"
        tests: [not_null]
